name: super_tree
description: >
  Super Tree — a GeniusLink design-system Flutter package providing SuperTree, a
  recursive, generic, keyboard-first hierarchy component. Its flagship instance
  AccountTree is a five-level bilingual chart of accounts with roll-up balances,
  a KPI summary, a live A = L + E balance badge, type filters, ancestor-
  preserving search, a DR/CR nature column and per-account share bars. The
  engine is generic over a node payload, so it reskins for files, org charts or
  any nested data. Light/dark + LTR/RTL.
publish_to: "none"
version: 0.2.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo-mark-white.png
