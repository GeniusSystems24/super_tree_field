name: super_tree_example
description: Runnable gallery for the super_tree Flutter package.

version: 0.1.0

topics:
  - flutter
  - widgets
  - material-design
  - design-system
  - theme

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink foundation (transitive via the package; listed for resolution).
  super_core: ^0.1.0
  super_tree:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
